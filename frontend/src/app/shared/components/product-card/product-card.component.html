<mat-card
  class="!bg-white/5 !border-white/10 !text-white !shadow-[0_0_20px_rgba(0,255,149,0.1)] transition-all"
>
  <div class="relative">
    <img
      mat-card-image
      [src]="getImageUrl(product().images[0])"
      [alt]="product().name"
      class="h-48 w-full object-cover"
      appImageError
    />
  </div>

  <mat-card-content>
    <p class="text-xs text-matcha-spring uppercase mt-1 mb-1 font-mono">{{ product().category }}</p>
    <h3 class="font-bold text-lg truncate">{{ product().name }}</h3>
    <p class="text-gray-400 text-sm line-clamp-2 p-10 mt-2">{{ product().description }}</p>
  </mat-card-content>

  <mat-card-actions class="flex justify-center items-center p-4 pt-0">
    <div class="flex flex-col">
      @if (product().promoPrice) {
        <span class="line-through text-xs text-gray-500">{{
          product().price | currency: 'EUR'
        }}</span>
        <span class="text-matcha-spring text-xl font-bold">{{
          product().promoPrice | currency: 'EUR'
        }}</span>
      } @else {
        <span class="text-matcha-spring mt-4 text-xl font-bold">{{
          product().price | currency: 'EUR'
        }}</span>
      }
      <button
        mat-mini-fab
        (click)="onAddToShoppingCart(product())"
        class="!text-black !bg-matcha-spring !w-48 !h48 !mb-4 !rounded-lg"
      >
        <mat-icon>add_shopping_cart</mat-icon>
      </button>
    </div>
  </mat-card-actions>
</mat-card>
