<!-- Matcha Center Navbar -->
<nav class="navbar-container">
  <!-- Left: Logo & Branding -->
  <div class="navbar-brand">
    <div class="logo-badge">{{ siteName().charAt(0) }}</div>
    <span class="brand-title">{{ siteName() }}</span>
  </div>

  <!-- Center: Navigation Menu -->
  <div class="navbar-menu">
    @for (item of menuItem(); track item.route) {
      <a (click)="navigateToMenuItem(item.route)" class="nav-item !hover:cursor-pointer" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }">
        <span>{{ item.label }}</span>
        @if (item.badge && item.badge > 0) {
          <span class="nav-badge">{{ item.badge }}</span>
        }
      </a>
    }
  </div>

  <!-- Right: Actions & User -->
  <div class="navbar-actions">
    <!-- Theme Toggle -->
    <button
      class="action-button theme-toggle-btn"
      (click)="themeService.toggleTheme()"
      [title]="themeService.theme === 'light' ? 'Mode Sombre' : 'Mode Clair'"
    >
      <mat-icon>{{ themeService.theme === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
    </button>

    @if (authService.currentUser$ | async; as user) {
      <!-- Notifications -->
      <!--
      <button class="action-button notification-btn" title="Notifications">
        <mat-icon>notifications</mat-icon>
        <span class="notification-dot"></span>
      </button>
      -->

      <!-- Shopping Cart -->
      <button class="action-button cart-btn" routerLink="/shopping-cart" title="Panier">
        <mat-icon>shopping_cart</mat-icon>
        @if (cartCount() > 0) {
          <span class="cart-badge">{{ cartCount() }}</span>
        }
      </button>

      <!-- User Profile Dropdown -->
      <div class="user-menu">
        <button class="user-profile-btn" (click)="goToDashboard()" title="Tableau de bord">
          <div class="avatar-circle">
            @if (currentUser()?.avatar) {
              <img [src]="getAvatarUrl(currentUser()?.avatar)" alt="avatar" appImageError />
            } @else {
              <span class="avatar-letter">
                @if (currentUser()?.role === 'admin') {
                  A
                } @else if (currentUser()?.role === 'acheteur') {
                  C
                } @else if (currentUser()?.role === 'boutique') {
                  B
                } @else {
                  U
                }
              </span>
            }
          </div>
          <span class="user-name">{{ name() }}</span>
          <mat-icon class="dropdown-arrow">expand_more</mat-icon>
        </button>
      </div>

      <!-- Logout Button -->
      <button class="logout-btn" (click)="authService.logout()" title="Déconnexion">
        <mat-icon>logout</mat-icon>
        <span class="logout-text">Quitter</span>
      </button>
    } @else {
      <!-- Login button when not authenticated -->
      <a mat-flat-button class="login-btn" routerLink="/login">
        <mat-icon>login</mat-icon>
        <span>Connexion</span>
      </a>

      <!-- Register button - only shown when registrations are open -->
      @if (allowRegistrations()) {
        <a mat-flat-button class="login-btn" routerLink="/register" style="background: rgba(132,204,22,0.15); border: 1px solid #84cc16; color:#84cc16; margin-left: 0.5rem">
          <mat-icon>person_add</mat-icon>
          <span>S'inscrire</span>
        </a>
      }

      <!-- Shopping Cart (anonymous) -->
      <button class="action-button cart-btn" routerLink="/shopping-cart" title="Panier">
        <mat-icon>shopping_cart</mat-icon>
        @if (cartCount() > 0) {
          <span class="cart-badge">{{ cartCount() }}</span>
        }
      </button>
    }
  </div>
</nav>
