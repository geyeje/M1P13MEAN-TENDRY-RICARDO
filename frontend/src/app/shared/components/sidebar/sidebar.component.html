<!-- shared/sidebar adapted from shop-owner style -->
<aside class="sidebar" [class.open]="isOpen()">
  <div class="sidebar-header">
    <div class="brand">
      <span class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
      </span>
      <span class="brand-text" *ngIf="isOpen()">Matcha Center</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of items()"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="nav-item"
      [title]="item.label"
    >
      <span class="nav-icon" [ngSwitch]="item.icon">
        <svg *ngSwitchCase="'dashboard'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
        <svg *ngSwitchCase="'shop'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        <svg *ngSwitchCase="'package'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
        <svg *ngSwitchCase="'shopping-cart'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path></svg>
        <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1V15a2 2 0 01-2-2 2 2 0 012-2v-.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"></path></svg>
      </span>
      <span class="nav-label" *ngIf="isOpen()">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && isOpen()">{{ item.badge }}</span>
    </a>
  </nav>

  <!-- user profile block kept from previous design -->
  <div class="mt-auto p-4 bg-white/5 rounded-2xl border border-white/5">
    <div class="flex items-center gap-3">
      <ng-container *ngIf="currentUser()?.role === 'admin'">
        <div class="w-10 h-10 bg-matcha-spring/20 rounded-full flex items-center justify-center font-bold text-matcha-spring">A</div>
      </ng-container>
      <ng-container *ngIf="currentUser()?.role === 'acheteur'">
        <div class="w-10 h-10 bg-matcha-spring/20 rounded-full flex items-center justify-center font-bold text-matcha-spring">C</div>
      </ng-container>
      <ng-container *ngIf="currentUser()?.role === 'boutique'">
        <div class="w-10 h-10 bg-matcha-spring/20 rounded-full flex items-center justify-center font-bold text-matcha-spring">B</div>
      </ng-container>
      <ng-container *ngIf="currentUser()?.role !== 'admin' && currentUser()?.role !== 'acheteur' && currentUser()?.role !== 'boutique'">
        <div class="w-10 h-10 bg-matcha-spring/20 rounded-full flex items-center justify-center font-bold text-matcha-spring">U</div>
      </ng-container>
      <div class="overflow-hidden !text-ellipsis !h-16">
        <p class="text-white font-bold text-sm truncate">{{name()}}</p>
        <p *ngIf="currentUser()" class="text-xs text-green-500 truncate">Connecté</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  
  <button class="btn-logout mt-4" (click)="logout()" [title]="'Se déconnecter'">
    <span class="logout-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></span>
    <span class="logout-text" *ngIf="isOpen()">Déconnexion</span>
  </button>
</aside>
