<div class="p-8">
  <h2 class="text-3xl font-black !text-[#a1a1a1] text-center mb-6">Mon Panier</h2>

  <!-- Stats Section -->
    <div class="flex justify-evenly items-center mt-6 p-4 flex gap-8">
      <div class="p-4 rounded-lg border !border-white/10 !border-l-5 !border-l-green-500 shadow-xl bg-matcha-dark">
        <p class="text-gray-400 text-lg">Nombre total d'articles</p>
        <p class="text-matcha-spring flex justify-center items-center font-bold text-2xl">{{ totalItems() }}</p>
      </div>
      <div class="p-4 rounded-lg border !border-white/10 !border-l-5 !border-l-green-500 shadow-xl bg-matcha-dark">
        <p class="text-gray-400 text-lg">Total de l'achat</p>
        <p class="text-matcha-spring flex justify-center items-center font-bold text-2xl">{{ total() | appCurrency }}</p>
      </div>
    </div>

  @if (items().length === 0) {
    <p class="text-gray-400">Votre panier est vide.</p>
  } @else {
    <div class="space-y-4">
      @for (item of items(); track item.product._id) {
        <app-cart-item
          [item]="item"
          (remove)="remove($event)"
          (quantityChange)="updateQty($event.productId, $event.quantity)"
        ></app-cart-item>
      }
    </div>

    <div class="mt-8 text-right">
      <span class="text-matcha-spring font-bold text-xl">Total: {{ total() | appCurrency }}</span>
      <button class="mx-2 px-4 py-2 bg-red-500 text-white rounded" (click)="cart.clear()">
        Vider le panier
      </button>
      <button
        class="mx-2 px-4 py-2 rounded border border-White/5 validate-btn"
        routerLink="/checkout"
      >
        Valider l'achat
      </button>
    </div>
  }
</div>
