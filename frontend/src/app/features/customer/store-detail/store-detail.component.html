<div class="p-8 mx-2 mt-4 min-h-screen bg-matcha-dark rounded-xl shadow-md border-white/10 border-2">
  <ng-container *ngIf="loading(); else loaded">
    <div class="flex items-center justify-center h-64">
      <span class="text-matcha-spring animate-pulse">Chargement...</span>
    </div>
  </ng-container>

  <ng-template #loaded>
    <ng-container *ngIf="boutique(); else errorTpl">
      <div class="bg-white rounded-lg p-6 shadow-md">
        <div class="flex flex-col md:flex-row items-center gap-4">
          <img
            [src]="getImageUrl(boutique()?.logo || '')"
            alt="{{ boutique()?.name }}"
            class="h-32 w-32 object-cover rounded"
            appImageError
          />
          <div>
            <h1 class="text-2xl font-bold">{{ boutique()?.name }}</h1>
            <p class="text-gray-600">{{ boutique()?.category }}</p>
          </div>
        </div>
        <p class="mt-4">{{ boutique()?.description }}</p>
      </div>
    </ng-container>

    <ng-template #errorTpl>
      <div class="text-red-400">{{ error() }}</div>
    </ng-template>
  </ng-template>
</div>
