<div class="admin-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" [class.open]="isSidebarOpen">
    <div class="sidebar-header">
      <div class="brand" routerLink="/" style="cursor: pointer">
        <span class="brand-icon">
          <mat-icon>security</mat-icon>
        </span>
        <span class="brand-text" *ngIf="isSidebarOpen">Admin Panel</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a
        *ngFor="let item of menuItems"
        [routerLink]="item.route"
        routerLinkActive="active"
        class="nav-item"
        [title]="item.label"
      >
        <span class="nav-icon">
          <mat-icon [style.color]="item.color">{{ item.icon }}</mat-icon>
        </span>
        <span class="nav-label" *ngIf="isSidebarOpen">{{ item.label }}</span>
        <span class="nav-badge" *ngIf="item.badge && isSidebarOpen">{{ item.badge }}</span>
      </a>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" (click)="logout()" [title]="'Se déconnecter'">
        <span class="logout-icon">
          <mat-icon>logout</mat-icon>
        </span>
        <span class="logout-text" *ngIf="isSidebarOpen">Déconnexion</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-layout" [class.sidebar-open]="isSidebarOpen">
    <!-- Top Header -->
    <header class="top-header">
      <button class="toggle-btn" (click)="toggleSidebar()">
        <span class="icon">
          <mat-icon>menu</mat-icon>
        </span>
      </button>

      <!-- Theme Toggle -->
      <button
        class="action-button theme-toggle-btn ms-2"
        (click)="themeService.toggleTheme()"
        [title]="themeService.theme === 'light' ? 'Mode Sombre' : 'Mode Clair'"
      >
        <mat-icon>{{ themeService.theme === 'light' ? 'dark_mode' : 'light_mode' }}</mat-icon>
      </button>

      <!-- Settings Shortcut -->
      <button
        class="action-button ms-2"
        routerLink="/admin/settings"
        title="Paramètres de la plateforme"
      >
        <mat-icon>settings</mat-icon>
      </button>

      <div class="header-right">
        <div class="user-profile" *ngIf="user$ | async as user">
          <div class="user-avatar">{{ user.nom.charAt(0) }}{{ user.prenom.charAt(0) }}</div>
          <div class="user-info">
            <span class="user-name">{{ user.nom }} {{ user.prenom }}</span>
            <span class="user-role">Super Admin</span>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
