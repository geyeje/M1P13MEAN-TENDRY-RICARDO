<div class="min-h-screen  flex items-center justify-center bg-atlas-dark/20 px-4">
    <div class="max-w-md w-full space-y-8 p-10 bg-[1a1a1a] rounded-3xl shadow-2xl border border-white/5">
        <div class="text-center">
            <h2 class="text-4xl font-black text-white italic">MATCHA<span class="text-atlas-spring">.</span></h2>
            <p class="mt-2 text-gray-400">Veuillez vous connecter</p>
        </div>
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="mt-8 space-y-8">
            <div class="space-y-4">
                <input formControlName="email" type="email" placeholder="Email"
                    class="w-full px-5 py-4 bg-black/20 border border-white/10 text-white rounded-xl focus:border-atlas-spring focus:bg-atlas-spring/80 focus:ring-1 focus:ring-atlas-spring outline-none transition-all">
                <input formControlName="password" type="password" placeholder="mot de passe"
                    class="w-full px-5 py-4 bg-black/20 border border-white/10 text-white rounded-xl focus:border-atlas-spring focus:bg-atlas-spring/80 focus:ring-1 focus:ring-atlas-spring outline-none transition-all">
            </div>
            <div>
                <button type="submit" [disabled]="loginForm.invalid || isLoading()"
                    class="w-full font-bold py-4 text-black bg-atlas-spring rounded-xl hover:bg-[#00a771] transition-colors disabled:opacity-30 disabled:cursor-not-allowed">
                    {{isLoading() ? 'Authentification...' : 'Connecter'}}
                </button>
            </div>
        </form>
    </div>
</div>
