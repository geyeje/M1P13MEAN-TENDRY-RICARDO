<form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6 p-8 bg-matcha-dark rounded-3xl border border-white/5">
  
  <h2 class="text-2xl font-bold text-white mb-6">
    {{ productToEdit() ? 'Modifier le produit' : 'Ajouter un nouveau trésor' }}
  </h2>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Nom du produit</label>
      <input formControlName="name" type="text" 
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all"
             placeholder="Ex: Matcha Premium Bio">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Quantité en stock</label>
      <input formControlName="stock" type="number" 
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Description</label>
      <textarea formControlName="description" rows="3" 
                class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all"
                placeholder="Détails du produit..."></textarea>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Catégorie</label>
      <select formControlName="category" 
              class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none">
        @for(category of productService.getCategories(); track category) {
          <option [value]="category">{{ category }}</option>
        }
      </select>
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Marque</label>
      <input formControlName="brand" type="text" 
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none"
             placeholder="Ex: Nike">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Couleurs (séparées par des virgules)</label>
      <input formControlName="colors" type="text" (change)="splitArray('colors')"
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none"
             placeholder="rouge, bleu, vert">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tailles (séparées par des virgules)</label>
      <input formControlName="sizes" type="text" (change)="splitArray('sizes')"
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none"
             placeholder="S, M, L">
    </div>

    <div class="flex flex-col gap-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Tags (séparés par des virgules)</label>
      <input formControlName="tags" type="text" (change)="splitArray('tags')"
             class="w-full px-4 py-3 bg-white/5 border border-white/10 text-white rounded-xl focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none"
             placeholder="cadeau, bio, artisanat">
    </div>

    <div class="flex flex-col gap-2 md:col-span-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Spécifications (JSON)</label>
      <textarea formControlName="specs" rows="3"
                class="bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:border-matcha-spring outline-none transition-all"
                placeholder='Ex: {"poids":"200g","matière":"coton"}'></textarea>
    </div>

    <div class="flex flex-col gap-2 md:col-span-2">
      <label class="text-xs font-bold text-gray-400 uppercase tracking-wider">Images (max 5)</label>
      <input type="file" (change)="onImagesSelected($event)" multiple
             class="w-full bg-white/5 text-white border border-white/10 rounded-lg p-2 focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all">
      <small class="text-gray-300">Les fichiers seront envoyés lors de l&rsquo;envoi du formulaire.</small>
    </div>
  </div>

  <div class="p-6 bg-white/5 rounded-2xl border border-white/10 space-y-4">
    <div class="flex items-center justify-between">
      <label class="font-bold text-white">Mettre en promotion ?</label>
      <input type="checkbox" formControlName="onSale" class="w-6 h-6 accent-matcha-spring">
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div class="flex flex-col gap-2">
        <label class="text-[10px] text-gray-500 uppercase">Prix normal (€)</label>
        <input formControlName="price" type="number" class="w-full px-2 py-2 bg-white/5 border border-white/10 text-white rounded-lg focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all">
      </div>
      @if (productForm.get('onSale')?.value) {
        <div class="flex flex-col gap-2">
          <label class="text-[10px] text-matcha-spring uppercase font-bold">Prix Promo (€)</label>
          <input formControlName="promoPrice" type="number" class="w-full px-2 py-2 bg-white/5 border border-white/10 text-white rounded-lg focus:border-matcha-spring focus:bg-matcha-spring/80 focus:ring-1 focus:ring-matcha-spring outline-none transition-all">
        </div>
      }
    </div>
  </div>
  

  <button type="submit" [disabled]="productForm.invalid"
          class="w-full py-4 bg-matcha-spring disabled:bg-gray-700 disabled:cursor-not-allowed text-black font-black rounded-xl transition-transform active:scale-95">
    {{ productToEdit() ? 'METTRE À JOUR' : 'PUBLIER LE PRODUIT' }}
  </button>
</form>
