<div class="product-card-container border rounded-3 p-3 transition-all">
  <div class="d-flex gap-3">
    <div class="relative w-20 h-20 rounded-3 overflow-hidden bg-theme-subtle flex-shrink-0">
      <img [src]="product().images[0]" class="object-cover w-100 h-100 opacity-80" />
      @if (product().onSale) {
        <div class="absolute inset-0 bg-promo-overlay d-flex align-items-center justify-center">
          <span class="badge bg-warning text-dark">PROMO</span>
        </div>
      }
    </div>

    <div class="flex-grow-1 min-w-0">
      <h4 class="product-title font-bold text-truncate">{{ product().name }}</h4>
      <div class="d-flex align-items-center gap-2 mt-1">
        <span class="price-text font-black">{{ product().price | currency: 'EUR' }}</span>
        <span
          [class]="[
            'badge',
            stockStatus() ? 'stock-badge-' + stockStatus().label.toLowerCase() : '',
          ]"
        >
          {{ stockStatus().label }} : {{ product().stock }}
        </span>
      </div>
    </div>
  </div>

  <div class="row g-2 mt-3 pt-3 border-top text-center">
    <div class="col-4">
      <p class="small-label text-muted text-uppercase mb-0">Ventes</p>
      <p class="stat-value font-bold mb-0">{{ product().salesCount }}</p>
    </div>
    <div class="col-4">
      <p class="small-label text-muted text-uppercase mb-0">Vues</p>
      <p class="stat-value font-bold mb-0">{{ product().viewCount }}</p>
    </div>
    <div class="col-4">
      <p class="small-label text-muted text-uppercase mb-0">Note</p>
      <p class="stat-value font-bold mb-0">{{ product().avgRating }}/5</p>
    </div>
  </div>

  <div class="d-flex gap-2 mt-3">
    <button class="btn btn-outline-secondary btn-sm flex-grow-1 font-bold">MODIFIER</button>
    <button class="btn btn-outline-danger btn-sm">
      <mat-icon class="!text-sm">delete</mat-icon>
    </button>
  </div>
</div>
