<div class="bg-white/5 border border-white/10 rounded-2xl p-4 hover:bg-white/10 transition-all">
  <div class="flex gap-4">
    <div class="relative w-20 h-20 rounded-xl overflow-hidden bg-gray-800 shrink-0">
      <img [src]="product().images[0]" class="object-cover w-full h-full opacity-80">
      @if (product().onSale) {
        <div class="absolute inset-0 bg-matcha-spring/80 flex items-center justify-center">
          <span class="text-[10px] font-bold text-black bg-matcha-spring px-1 rounded">PROMO</span>
        </div>
      }
    </div>

    <div class="flex-1 min-w-0">
      <h4 class="text-white font-bold truncate">{{ product().name }}</h4>
      <div class="flex items-center gap-3 mt-1">
        <span class="text-xl font-black text-white">{{ product().price | currency:'EUR' }}</span>
        <span [class]="['px-2 py-0.5 rounded text-[10px] font-bold uppercase', stockStatus().bg, stockStatus().color]">
          {{ stockStatus().label }} : {{ product().stock }}
        </span>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-3 gap-2 mt-4 pt-4 border-t border-white/5 text-center">
    <div>
      <p class="text-[10px] text-gray-500 uppercase">Ventes</p>
      <p class="text-sm font-bold text-white">{{ product().salesCount }}</p>
    </div>
    <div>
      <p class="text-[10px] text-gray-500 uppercase">Vues</p>
      <p class="text-sm font-bold text-white">{{ product().viewCount }}</p>
    </div>
    <div>
      <p class="text-[10px] text-gray-500 uppercase">Note</p>
      <p class="text-sm font-bold text-white">{{ product().avgRating }}/5</p>
    </div>
  </div>

  <div class="flex gap-2 mt-4">
    <button class="flex-1 py-2 bg-white/5 hover:bg-white/10 rounded-lg text-xs font-bold transition-all">
      MODIFIER
    </button>
    <button class="p-2 bg-red-500/10 hover:bg-red-500/20 text-red-500 rounded-lg transition-all">
      <mat-icon class="!text-sm">delete</mat-icon>
    </button>
  </div>
</div>
