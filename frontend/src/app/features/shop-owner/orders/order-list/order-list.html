<div class="orders-container">
  <div class="page-header">
    <h1>
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        style="width: 24px; height: 24px; vertical-align: middle; margin-right: 8px"
      >
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
      </svg>
      Mes Commandes
    </h1>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button
      *ngFor="let s of statuses"
      (click)="filterByStatus(s.value)"
      [class.active]="selectedStatus === s.value"
      class="filter-btn"
    >
      {{ s.label }}
    </button>
  </div>

  <!-- Table -->
  <table class="orders-table" *ngIf="!loading && orders.length > 0">
    <thead>
      <tr>
        <th>N° Commande</th>
        <th>Date</th>
        <th>Client</th>
        <th>Montant</th>
        <th>Statut</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let order of orders">
        <td>
          <strong>{{ order.orderNumber || order.orderCount }}</strong>
        </td>
        <td>{{ formatDate(order.createdAt) }}</td>
        <td>{{ order.buyerId?.lastname }} {{ order.buyerId?.firstname }}</td>
        <td>
          <strong>{{ formatCurrency(order.totalAmount) }}</strong>
        </td>
        <td>
          <span class="badge" [ngClass]="'badge-' + orderService.getStatusColor(order.status)">
            {{ orderService.getStatusLabel(order.status) }}
          </span>
        </td>
        <td>
          <a [routerLink]="['/shop-owner/orders', order._id]" class="btn-view">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="width: 14px; height: 14px; vertical-align: middle; margin-right: 4px"
            >
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            Voir
          </a>
          <select
            (change)="quickUpdateStatus(order._id, $any($event.target).value)"
            [value]="order.status"
            class="status-select"
          >
            <option value="pending">En attente</option>
            <option value="confirmed">Confirmée</option>
            <option value="processing">En préparation</option>
            <option value="shipped">Expédiée</option>
            <option value="delivered">Livrée</option>
          </select>
        </td>
      </tr>
    </tbody>
  </table>
</div>
