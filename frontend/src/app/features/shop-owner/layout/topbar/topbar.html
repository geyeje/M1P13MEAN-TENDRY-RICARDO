<!-- src/app/features/shop-owner/layout/topbar/topbar.component.html -->
<header class="topbar">
  <div class="topbar-left">
    <button class="btn-toggle" (click)="onToggleSidebar()" title="Toggle menu">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
      </svg>
    </button>

    <div class="shop-info" *ngIf="shopName">
      <h1 class="shop-name">{{ shopName }}</h1>
      <span class="shop-status" [ngClass]="getStatusClass(shopStatus)">
        {{ getStatusLabel(shopStatus) }}
      </span>
    </div>
  </div>

  <div class="topbar-right">
    <!-- Notifications -->
    <button class="btn-icon" title="Notifications">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
      </svg>
      <span class="badge">3</span>
    </button>

    <!-- User Menu -->
    <div class="user-menu" *ngIf="user$ | async as user">
      <div class="user-avatar">
        {{ user.nom.charAt(0) }}{{ user.prenom.charAt(0) }}
      </div>
      <div class="user-info">
        <div class="user-name">{{ user.nom }} {{ user.prenom }}</div>
        <div class="user-role">Gérant</div>
      </div>
    </div>
  </div>
</header>
