<!-- src/app/features/shop-owner/layout/sidebar/sidebar.component.html -->
<aside class="sidebar" [class.open]="isOpen">
  <!-- Header -->
  <div class="sidebar-header">
    <div class="brand" routerLink="/" style="cursor: pointer">
      <i class="cil-basket brand-icon"></i>
      <span class="brand-text" *ngIf="isOpen">Ma Boutique</span>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of menuItems"
      [routerLink]="item.route"
      routerLinkActive="active"
      class="nav-item"
      [title]="item.label"
    >
      <i class="nav-icon" [ngClass]="'cil-' + item.icon"></i>
      <span class="nav-label" *ngIf="isOpen">{{ item.label }}</span>
      <span class="nav-badge" *ngIf="item.badge && isOpen">{{ item.badge }}</span>
    </a>
  </nav>

  <!-- Footer -->
  <div class="sidebar-footer">
    <div class="user-info" *ngIf="user$ | async as user">
      <div class="user-avatar">{{ user.nom.charAt(0) }}{{ user.prenom.charAt(0) }}</div>
      <div class="user-details" *ngIf="isOpen">
        <div class="user-name">{{ user.nom }} {{ user.prenom }}</div>
        <div class="user-role">Gérant</div>
      </div>
    </div>
    <button class="btn-theme-toggle mb-2" (click)="toggleTheme()" [title]="'Changer de thème'">
      <i [ngClass]="themeService.theme === 'dark' ? 'cil-sun' : 'cil-moon'" class="theme-icon"></i>
      <span class="theme-text" *ngIf="isOpen">{{
        themeService.theme === 'dark' ? 'Mode Clair' : 'Mode Nuit'
      }}</span>
    </button>
    <button class="btn-logout" (click)="logout()" [title]="'Se déconnecter'">
      <i class="cil-account-logout logout-icon"></i>
      <span class="logout-text" *ngIf="isOpen">Déconnexion</span>
    </button>
  </div>
</aside>
