<div class="edit-shop-container">
  <div class="page-header">
    <h1>Modifier ma Boutique</h1>
    <button routerLink="/shop-owner/my-shop" class="btn-secondary">Annuler</button>
  </div>

  <div *ngIf="successMessage" class="alert alert-success">✅ {{ successMessage }}</div>
  <div *ngIf="error" class="alert alert-danger">❌ {{ error }}</div>

  <form [formGroup]="editForm" (ngSubmit)="onSubmit()" class="edit-form">
    <!-- Logo et Bannière -->
    <div class="images-section">
      <div class="upload-box">
        <label>Logo</label>
        <input type="file" (change)="onLogoChange($event)" accept="image/*">
        <img *ngIf="logoPreview" [src]="logoPreview" class="preview">
      </div>
      <div class="upload-box">
        <label>Bannière</label>
        <input type="file" (change)="onBannerChange($event)" accept="image/*">
        <img *ngIf="bannerPreview" [src]="bannerPreview" class="preview">
      </div>
    </div>

    <!-- Informations de base -->
    <div class="form-group">
      <label>Nom de la boutique *</label>
      <input type="text" formControlName="name" class="form-control">
    </div>

    <div class="form-group">
      <label>Description *</label>
      <textarea formControlName="description" class="form-control" rows="4"></textarea>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Catégorie *</label>
        <select formControlName="category" class="form-control">
          <option *ngFor="let cat of categories" [value]="cat">{{ cat }}</option>
        </select>
      </div>
      <div class="form-group">
        <label>Téléphone *</label>
        <input type="tel" formControlName="phone" class="form-control">
      </div>
    </div>

    <div class="form-group">
      <label>Email *</label>
      <input type="email" formControlName="email" class="form-control">
    </div>

    <div class="form-group">
      <label>Adresse *</label>
      <textarea formControlName="adresse" class="form-control" rows="2"></textarea>
    </div>

    <!-- Réseaux sociaux -->
    <h3>Réseaux sociaux</h3>
    <div class="form-group">
      <label>Facebook</label>
      <input type="url" formControlName="facebook" class="form-control" placeholder="https://facebook.com/...">
    </div>
    <div class="form-group">
      <label>Instagram</label>
      <input type="url" formControlName="instagram" class="form-control" placeholder="https://instagram.com/...">
    </div>

    <button type="submit" class="btn-primary" [disabled]="editForm.invalid || submitting">
      <span *ngIf="!submitting">💾 Enregistrer</span>
      <span *ngIf="submitting">⏳ Enregistrement...</span>
    </button>
  </form>
</div>
