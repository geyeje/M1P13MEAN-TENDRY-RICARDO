<!-- src/app/features/shop-owner/components/stat-widget/stat-widget.component.html -->
<div class="stat-widget" [ngClass]="colorClass">
  <div class="stat-header">
    <div class="stat-icon" [ngSwitch]="icon">
      <svg
        *ngSwitchCase="'package'"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        style="width: 24px; height: 24px"
      >
        <path
          d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"
        ></path>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
        <line x1="12" y1="22.08" x2="12" y2="12"></line>
      </svg>
      <svg
        *ngSwitchCase="'shopping-cart'"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        style="width: 24px; height: 24px"
      >
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
      </svg>
      <svg
        *ngSwitchCase="'dollar-sign'"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        style="width: 24px; height: 24px"
      >
        <line x1="12" y1="1" x2="12" y2="23"></line>
        <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"></path>
      </svg>
      <svg
        *ngSwitchCase="'star'"
        viewBox="0 0 24 24"
        fill="currentColor"
        stroke="none"
        style="width: 24px; height: 24px"
      >
        <polygon
          points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"
        ></polygon>
      </svg>
      <span *ngSwitchDefault>{{ icon }}</span>
    </div>
    <div class="stat-trend" *ngIf="trend" [ngClass]="trendClass">
      <span class="trend-icon">
        <svg
          *ngIf="trend > 0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="width: 14px; height: 14px"
        >
          <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
          <polyline points="17 6 23 6 23 12"></polyline>
        </svg>
        <svg
          *ngIf="trend < 0"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          style="width: 14px; height: 14px"
        >
          <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"></polyline>
          <polyline points="17 18 23 18 23 12"></polyline>
        </svg>
      </span>
      <span class="trend-value">{{ trend > 0 ? '+' : '' }}{{ trend }}%</span>
    </div>
  </div>

  <div class="stat-body">
    <h3 class="stat-title">{{ title }}</h3>
    <div class="stat-value">{{ value }}</div>
    <p class="stat-subtitle" *ngIf="subtitle">{{ subtitle }}</p>
  </div>
</div>
