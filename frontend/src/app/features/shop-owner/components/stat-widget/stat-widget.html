<!-- src/app/features/shop-owner/components/stat-widget/stat-widget.component.html -->
<div class="card text-white h-100 shadow-sm border-0" [ngClass]="colorClass">
  <div class="card-body p-4">
    <div class="d-flex justify-content-between align-items-center">
      <div>
        <div class="fs-6 fw-semibold text-white-50 mb-1">{{ title }}</div>
        <div class="fs-2 fw-bold">{{ value }}</div>
        <div class="fs-7 text-white-50 mt-1" *ngIf="subtitle">
          {{ subtitle }}
        </div>
      </div>
      <div class="fs-1 opacity-50">
        <i [class]="iconClass"></i>
      </div>
    </div>
    <div class="progress mt-3 bg-white bg-opacity-25" style="height: 4px" *ngIf="trend">
      <div
        class="progress-bar bg-white"
        role="progressbar"
        [style.width.%]="trend > 0 ? trend : 0"
        aria-valuemin="0"
        aria-valuemax="100"
      ></div>
    </div>
  </div>
</div>
