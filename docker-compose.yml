# version: '3.8'

services:
  # Base de données MongoDB
  mongodb:
    image: mongo:7.0
    container_name: mall-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: mall_db
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - mall-network

  # Backend Express API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mall-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/mall_db?authSource=admin
      JWT_SECRET: cc9b9de086d9968c6c3ddc0a2f1c42e9d05ffea9af9439f3a1e750367c5a050325f9a6d3e601743da16a58386c35a9d90c153ad65fb120b68e5ef1839598f80a
      JWT_EXPIRE: 7d
    ports:
      - '3000:5000'
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    depends_on:
      - mongodb
    networks:
      - mall-network
    command: npm run dev

  # Frontend Angular
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mall-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=development
    ports:
      - '4200:4200'
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - mall-network
    command: npx ng serve --host 0.0.0.0 --port 4200 --poll 2000

  # MongoDB Express (Interface Web pour MongoDB - Optionnel)
  mongo-express:
    image: mongo-express:latest
    container_name: mall-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    ports:
      - '8081:8081'
    depends_on:
      - mongodb
    networks:
      - mall-network

volumes:
  mongodb_data:
    driver: local

networks:
  mall-network:
    driver: bridge
